services:
  - type: web
    name: datastory-ai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATASTORY_DB
        value: /tmp/datastory.db
      - key: CORS_ORIGINS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATASTORY_TRAIN_JOBS
        value: "1"
      - key: DATASTORY_MAX_CV_FOLDS
        value: "3"
      - key: DATASTORY_NUMERIC_THREADS
        value: "1"
